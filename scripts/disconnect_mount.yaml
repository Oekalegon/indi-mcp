id: disconnect_mount
name: Disconnect the Mount device
description: >
  Disconnects the rig's Mount device (CONNECTION.DISCONNECT=On) and waits for it
  to finish disconnecting. A thin, reusable wrapper so composed sequences can
  `run_script: disconnect_mount` instead of repeating the raw set_property/wait_for
  steps — see docs/Design.md's "Composing scripts" section.
pausable: false
steps:
  - step: set_property
    role: mount
    property: CONNECTION
    elements: { DISCONNECT: "On" }
  - step: wait_for
    condition:
      role: mount
      property: CONNECTION
      element: CONNECT
      operator: equals
      value: "Off"
    timeoutSeconds: 30
