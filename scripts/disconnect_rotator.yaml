id: disconnect_rotator
name: Disconnect the Rotator device
description: >
  Disconnects the rig's Rotator device (CONNECTION.DISCONNECT=On) and waits for it
  to finish disconnecting. A thin, reusable wrapper so composed sequences can
  `run_script: disconnect_rotator` instead of repeating the raw set_property/wait_for
  steps — see docs/Design.md's "Composing scripts" section.
pausable: false
steps:
  - step: set_property
    role: rotator
    property: CONNECTION
    elements: { DISCONNECT: "On" }
  - step: wait_for
    condition:
      role: rotator
      property: CONNECTION
      element: CONNECT
      operator: equals
      value: "Off"
    timeoutSeconds: 30
