id: focus_absolute
name: Move the focuser to an absolute position
description: >
  Sets the focuser's absolute position and waits for the move to complete. There is no
  dedicated `focus` step primitive (only `capture_frame`/`slew`/`cool_camera`/
  `select_filter` are engine-implemented bundles — see docs/ScriptSchema.md's "Step
  primitives" design notes), so this composes `set_property`/`wait_for` directly against
  the standard INDI absolute-focuser property.
pausable: false
parameters:
  position:
    type: number
    required: true
    description: >
      Target absolute focuser position, within the rig's focuser component's
      minPosition/maxPosition range.
steps:
  - step: set_property
    role: focuser
    property: ABS_FOCUS_POSITION
    elements: { FOCUS_ABSOLUTE_POSITION: "{{ position }}" }
  - step: wait_for
    condition:
      role: focuser
      property: ABS_FOCUS_POSITION
      operator: equals
      value: Ok
    timeoutSeconds: 30
