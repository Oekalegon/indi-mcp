id: disconnect_filter_wheel
name: Disconnect the Filter Wheel device
description: >
  Disconnects the rig's Filter Wheel device (CONNECTION.DISCONNECT=On) and waits for it
  to finish disconnecting. A thin, reusable wrapper so composed sequences can
  `run_script: disconnect_filter_wheel` instead of repeating the raw set_property/wait_for
  steps — see docs/Design.md's "Composing scripts" section.
pausable: false
steps:
  - step: set_property
    role: filterWheel
    property: CONNECTION
    elements: { DISCONNECT: "On" }
  - step: wait_for
    condition:
      role: filterWheel
      property: CONNECTION
      element: CONNECT
      operator: equals
      value: "Off"
    timeoutSeconds: 30
