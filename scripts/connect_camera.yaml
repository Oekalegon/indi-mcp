id: connect_camera
name: Connect the Camera device
description: >
  Connects the rig's Camera device (CONNECTION.CONNECT=On) and waits for it
  to finish connecting. A thin, reusable wrapper so composed sequences can
  `run_script: connect_camera` instead of repeating the raw set_property/wait_for
  steps — see docs/Design.md's "Composing scripts" section.
pausable: false
steps:
  - step: set_property
    role: camera
    property: CONNECTION
    elements: { CONNECT: "On" }
  - step: wait_for
    condition:
      role: camera
      property: CONNECTION
      operator: equals
      value: Ok
    timeoutSeconds: 30
