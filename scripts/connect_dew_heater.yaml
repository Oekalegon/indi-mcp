id: connect_dew_heater
name: Connect the Dew Heater device
description: >
  Connects the rig's Dew Heater device (CONNECTION.CONNECT=On) and waits for it
  to finish connecting. A thin, reusable wrapper so composed sequences can
  `run_script: connect_dew_heater` instead of repeating the raw set_property/wait_for
  steps — see docs/Design.md's "Composing scripts" section.
pausable: false
steps:
  - step: set_property
    role: dewHeater
    property: CONNECTION
    elements: { CONNECT: "On" }
  - step: wait_for
    condition:
      role: dewHeater
      property: CONNECTION
      operator: equals
      value: Ok
    timeoutSeconds: 30
