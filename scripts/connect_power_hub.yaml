id: connect_power_hub
name: Connect the Power Hub device
description: >
  Connects the rig's Power Hub device (CONNECTION.CONNECT=On) and waits for it
  to finish connecting. A thin, reusable wrapper so composed sequences can
  `run_script: connect_power_hub` instead of repeating the raw set_property/wait_for
  steps — see docs/Design.md's "Composing scripts" section.
pausable: false
steps:
  - step: set_property
    role: powerHub
    property: CONNECTION
    elements: { CONNECT: "On" }
  - step: wait_for
    condition:
      role: powerHub
      property: CONNECTION
      operator: equals
      value: Ok
    timeoutSeconds: 30
