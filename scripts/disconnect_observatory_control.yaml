id: disconnect_observatory_control
name: Disconnect the Observatory Control device
description: >
  Disconnects the rig's Observatory Control device (CONNECTION.DISCONNECT=On) and waits for it
  to finish disconnecting. A thin, reusable wrapper so composed sequences can
  `run_script: disconnect_observatory_control` instead of repeating the raw set_property/wait_for
  steps — see docs/Design.md's "Composing scripts" section.
pausable: false
steps:
  - step: set_property
    role: observatoryControl
    property: CONNECTION
    elements: { DISCONNECT: "On" }
  - step: wait_for
    condition:
      role: observatoryControl
      property: CONNECTION
      element: CONNECT
      operator: equals
      value: "Off"
    timeoutSeconds: 30
