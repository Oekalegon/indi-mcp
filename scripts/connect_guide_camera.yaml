id: connect_guide_camera
name: Connect the Guide Camera device
description: >
  Connects the rig's Guide Camera device (CONNECTION.CONNECT=On) and waits for it
  to finish connecting. A thin, reusable wrapper so composed sequences can
  `run_script: connect_guide_camera` instead of repeating the raw set_property/wait_for
  steps — see docs/Design.md's "Composing scripts" section.
pausable: false
steps:
  - step: set_property
    role: guideCamera
    property: CONNECTION
    elements: { CONNECT: "On" }
  - step: wait_for
    condition:
      role: guideCamera
      property: CONNECTION
      operator: equals
      value: Ok
    timeoutSeconds: 30
