id: connect_flat_screen
name: Connect the Flat Screen device
description: >
  Connects the rig's Flat Screen device (CONNECTION.CONNECT=On) and waits for it
  to finish connecting. A thin, reusable wrapper so composed sequences can
  `run_script: connect_flat_screen` instead of repeating the raw set_property/wait_for
  steps — see docs/Design.md's "Composing scripts" section.
pausable: false
steps:
  - step: set_property
    role: flatScreen
    property: CONNECTION
    elements: { CONNECT: "On" }
  - step: wait_for
    condition:
      role: flatScreen
      property: CONNECTION
      operator: equals
      value: Ok
    timeoutSeconds: 30
