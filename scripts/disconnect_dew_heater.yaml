id: disconnect_dew_heater
name: Disconnect the Dew Heater device
description: >
  Disconnects the rig's Dew Heater device (CONNECTION.DISCONNECT=On) and waits for it
  to finish disconnecting. A thin, reusable wrapper so composed sequences can
  `run_script: disconnect_dew_heater` instead of repeating the raw set_property/wait_for
  steps — see docs/Design.md's "Composing scripts" section.
pausable: false
steps:
  - step: set_property
    role: dewHeater
    property: CONNECTION
    elements: { DISCONNECT: "On" }
  - step: wait_for
    condition:
      role: dewHeater
      property: CONNECTION
      element: CONNECT
      operator: equals
      value: "Off"
    timeoutSeconds: 30
