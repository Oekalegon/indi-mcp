id: connect_filter_wheel
name: Connect the Filter Wheel device
description: >
  Connects the rig's Filter Wheel device (CONNECTION.CONNECT=On) and waits for it
  to finish connecting. A thin, reusable wrapper so composed sequences can
  `run_script: connect_filter_wheel` instead of repeating the raw set_property/wait_for
  steps — see docs/Design.md's "Composing scripts" section.
pausable: false
steps:
  - step: set_property
    role: filterWheel
    property: CONNECTION
    elements: { CONNECT: "On" }
  - step: wait_for
    condition:
      role: filterWheel
      property: CONNECTION
      operator: equals
      value: Ok
    timeoutSeconds: 30
