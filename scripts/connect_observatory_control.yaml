id: connect_observatory_control
name: Connect the Observatory Control device
description: >
  Connects the rig's Observatory Control device (CONNECTION.CONNECT=On) and waits for it
  to finish connecting. A thin, reusable wrapper so composed sequences can
  `run_script: connect_observatory_control` instead of repeating the raw set_property/wait_for
  steps — see docs/Design.md's "Composing scripts" section.
pausable: false
steps:
  - step: set_property
    role: observatoryControl
    property: CONNECTION
    elements: { CONNECT: "On" }
  - step: wait_for
    condition:
      role: observatoryControl
      property: CONNECTION
      operator: equals
      value: Ok
    timeoutSeconds: 30
